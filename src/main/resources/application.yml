spring:
  application:
    name: High-Concurrency-Ticketing-API

  datasource:
    url: jdbc:postgresql://localhost:5432/ticketing_db
    username: postgres
    password: 1111
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 100
      minimum-idle: 20

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true

  data:
    redis:
      host: localhost
      port: 6379

  rabbitmq:
    host: localhost
    port: 5672
    username: guest
    password: guest
    cache:
      channel:
        size: 100
    listener:
      simple:
        retry:
          enabled: true
          max-retries: 3
          initial-interval: 1000
        default-requeue-rejected: false

  mail:
    host: localhost
    port: 1025
    properties:
      mail:
        smtp:
          auth: false
          starttls:
            enable: false